      <script>
         async function doLogin() {
    const username = document.getElementById('username-input').value;

    if (!username) {
        alert("Please enter a username!");
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username })
        });

        const result = await response.json();

        if (response.ok) {
            localStorage.clear();
            localStorage.setItem('currentUser', JSON.stringify(result.user));
            
            // This is the important change:
            window.location.href = `YourProfile.html?user=${result.user.username}`;
        }
    } catch (err) {
        console.error("Connection error:", err);
        alert("Could not connect to the server. Make sure server.js is running!");
    }
}
     </script>
     <div>
      <script>
        async function doSignUp() {
    const username = document.getElementById('username-input').value.trim();
    const password = document.getElementById('password-input').value.trim();

    // 1. Mandatory Check (Frontend)
    if (!username || !password) {
        alert("STOP! You must enter both a username and a password to join.");
        return; // This stops the function from running
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
            alert("Account created! Welcome to the revival.");
            window.location.href = `YourProfile.html?user=${result.user.username}`;
        } else {
            alert("Error: " + result.message);
        }
    } catch (err) {
        alert("Could not connect to the BloxData cloud.");
    }
}
      </script>
