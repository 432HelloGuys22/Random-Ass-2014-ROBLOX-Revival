<script>
document.addEventListener("DOMContentLoaded", function() {
    const authContent = document.getElementById('navigation-auth-content');
    const savedUser = localStorage.getItem('currentUser');

    if (savedUser && authContent) {
        const user = JSON.parse(savedUser);
        
        // This replaces the "Sign Up | Login" text with the User Info
        authContent.innerHTML = `
            <div class="user-info-header" style="display: flex; align-items: center; gap: 10px; color: white; font-weight: bold;">
                <span>Welcome, ${user.username}</span>
                <a href="YourProfile.html?user=${user.username}" style="color: #fff; text-decoration: underline; font-size: 12px;">Profile</a>
                <a href="#" onclick="logout()" style="color: #ccc; font-size: 11px; text-decoration: none;">[Logout]</a>
            </div>
        `;
    }
});

function logout() {
    localStorage.removeItem('currentUser');
    window.location.reload(); // Refresh to show "Sign Up" again
}
</script>

      <script>
         async function doLogin() {
    const username = document.getElementById('username-input').value;

    if (!username) {
        alert("Please enter a username!");
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username })
        });

        const result = await response.json();

        if (response.ok) {
            localStorage.clear();
            localStorage.setItem('currentUser', JSON.stringify(result.user));
            
            // This is the important change:
            window.location.href = `YourProfile.html?user=${result.user.username}`;
        }
    } catch (err) {
        console.error("Connection error:", err);
        alert("Could not connect to the server. Make sure server.js is running!");
    }
}
     </script>
     <div>
      <script>
        async function doSignUp() {
    const username = document.getElementById('username-input').value.trim();
    const password = document.getElementById('password-input').value.trim();

    if (!username || !password) {
        alert("Please enter both a username and password!");
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
            // ✅ THE FIX: Save the user to the browser's memory
            localStorage.setItem('currentUser', JSON.stringify(result.user));
            
            alert("Account created! Redirecting...");
            
            // Redirect to the profile page
            window.location.href = `YourProfile.html?user=${result.user.username}`;
        } else {
            alert("Error: " + result.message);
        }
    } catch (err) {
        alert("Could not connect to the BloxData cloud.");
    }
}
      </script>
