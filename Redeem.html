<script>
document.addEventListener("DOMContentLoaded", function() {

                <a href="#" onclick="logout()" style="color: #ccc; font-size: 11px; text-decoration: none;">[Logout]</a>

        `;
    }
});

function logout() {
    localStorage.removeItem('currentUser');
    window.location.reload(); // Refresh to show "Sign Up" again
}

     <script>
    function redeemCode() {
        var codeInput = document.getElementById('redeemCodeInput');
        var code = codeInput.value.trim();
        
        // 1. Check if the box is empty
        if (code === "") {
            alert("Please enter a PIN code.");
            return;
        } 

        // 2. Check if it is EXACTLY 10 digits and only numbers
        // This uses a "Regular Expression" to check for 10 digits (0-9)
        var isTenDigits = /^\d{10}$/.test(code);

        if (!isTenDigits) {
            alert("Invalid PIN. The code must be exactly 10 numbers long.");
            return;
        }

        // 3. Logic for valid 10-digit codes
        if (code === "1234567890") {
            alert("Success! Test Code Redeemed.");
        } else {
            alert("Success! Code " + code + " has been redeemed.");
        }

        // Clear the box
        codeInput.value = "";
    }

    // This makes the 'Enter' key work for your input
    document.getElementById("redeemCodeInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            redeemCode();
        }
    });
</script>
<script>
    // These are your official 10-digit codes
    const codes = {
        "1111222233": 100,
        "1010101010": 1000,
        "0001110002": 5000,
        "8888444422": 20000
    };

    function updateCurrency() {
        // Pull data from browser memory (Defaults: 0 Robux, 10 Tix)
        let robux = localStorage.getItem('userRobux') || "0";
        let tix = localStorage.getItem('userTix') || "10";

        // Update every element on the page using these classes
        let rElements = document.getElementsByClassName('robux');
        for(let i = 0; i < rElements.length; i++) {
            rElements[i].innerText = parseInt(robux).toLocaleString();
        }

        let tElements = document.getElementsByClassName('tickets');
        for(let i = 0; i < tElements.length; i++) {
            tElements[i].innerText = parseInt(tix).toLocaleString();
        }
    }

    function redeemCode() {
        let input = document.getElementById('redeemCodeInput');
        if (!input) return;

        let enteredCode = input.value.trim();

        if (codes[enteredCode]) {
            let reward = codes[enteredCode];
            let current = parseInt(localStorage.getItem('userRobux') || "0");
            
            // Save new total
            localStorage.setItem('userRobux', current + reward);
            
            alert("Success! Added " + reward + " Robux.");
            input.value = "";
            updateCurrency();
        } else {
            alert("Invalid PIN. Please use an official 10-digit code.");
        }
    }

    // Initialize the numbers when the page finishes loading
    window.onload = updateCurrency;
</script>
