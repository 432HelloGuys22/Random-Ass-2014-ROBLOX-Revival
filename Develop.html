        <script>
script
function publishGame() {
    const gameName = document.getElementById('dev-game-name').value;
    const gameThumb = document.getElementById('dev-game-thumb').value; // Removed the || default here

    // 1. Validation: Check for Name AND Image
    if (!gameName) {
        alert("Please name your game first!");
        return;
    }
    
    if (!gameThumb) {
        alert("Please provide a Thumbnail URL!"); // This makes it required
        return;
    }

    // 2. SAVE to localStorage
    let games = JSON.parse(localStorage.getItem('UserGames')) || [];
    
    const newGame = {
        Name: gameName, 
        Creator: "EpiKUser",
        Date: new Date().toLocaleDateString(),
        Visits: "0",
        thumb: gameThumb
    };

    games.push(newGame);
    localStorage.setItem('UserGames', JSON.stringify(games));

    // 3. Redirect
    window.location.href = `GameCard.html?name=${encodeURIComponent(gameName)}&creator=EpiKUser`;
}
</script>
