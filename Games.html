<div id="header-login-container">

<script>
document.addEventListener("DOMContentLoaded", function() {
    const authContent = document.getElementById('navigation-auth-content');
    const savedUser = localStorage.getItem('currentUser');

    if (savedUser && authContent) {
        const user = JSON.parse(savedUser);
        
        // This replaces the "Sign Up | Login" text with the User Info
        authContent.innerHTML = `
            <div class="user-info-header" style="display: flex; align-items: center; gap: 10px; color: white; font-weight: bold;">
                <span>Welcome, ${user.username}</span>
                <a href="YourProfile.html?user=${user.username}" style="color: #fff; text-decoration: underline; font-size: 12px;">Profile</a>
                <a href="#" onclick="logout()" style="color: #ccc; font-size: 11px; text-decoration: none;">[Logout]</a>
            </div>
        `;
    }
});

function logout() {
    localStorage.removeItem('currentUser');
    window.location.reload(); // Refresh to show "Sign Up" again
}
</script>

<script type="text/javascript">
    window.addEventListener('load', function() {
        // 1. Get the game data we saw in your Application tab
        var rawData = localStorage.getItem('UserGames');
        var userGames = JSON.parse(rawData) || [];

        // 2. Find the grid container
        var grid = document.getElementById('user-games-grid');

        if (grid) {
            // 3. Loop through your games and build the HTML for each one
            userGames.forEach(function(game) {
    // This ensures we find the name even if the capitalization is different
    var displayName = game.Name || game.name || "Untitled Game";
    var displayThumb = game.thumb || 'images/game_thumbnail.png';

    grid.innerHTML += `
        <div class="game-item" style="width: 160px; margin-bottom: 10px; display: inline-block; vertical-align: top; margin-right: 15px;">
            <a href="GameCard.html?name=${encodeURIComponent(displayName)}&creator=${encodeURIComponent(game.Creator || 'EpiKUser')}&visits=${game.Visits || 0}&created=${encodeURIComponent(game.Date || '')}" style="text-decoration:none;">
                <div style="border:1px solid #ccc; padding:2px; background:#fff;">
                    <img src="${displayThumb}" style="width:150px; height:150px; display:block;" onerror="this.src='images/game_thumbnail.png'">
                </div>
                <div style="color:#035fb5; font-weight:bold; font-family:Arial; font-size:13px; margin-top:5px; text-align:center;">
                    ${displayName}
                </div>
            </a>
        </div>
    `;
            });
        }
    });
</script>
