                 <h2 style="margin-top: 0; font-family: Arial;">Search Users</h2>
<div style="min-height: 30px; overflow: hidden; margin-bottom: 20px; font-family: Arial;">
                    <span style="float:left; padding-top:5px; margin-right:10px; font-weight: bold;">Search:</span>

<div style="float:left; margin-left:10px;">
    <span class="btn-control btn-control-large" onclick="searchDatabase()">Search</span>

        <script>
    function searchUser() {
        // This gets the text you typed in the search box
        var name = document.getElementById('userSearchInput').value;
        var results = document.getElementById('searchResults');
        
        if(name.trim() === "") {
            results.innerHTML = "<p style='color:red;'>Please enter a name.</p>";
            return;
        }

        // This creates a "User Card" that links to their profile
        results.innerHTML = `
            <div style="border: 1px solid #ccc; padding: 15px; display: flex; align-items: center; gap: 15px; width: 400px; background: #f9f9f9; font-family: Arial;">
                <div style="width: 60px; height: 60px; background: #ddd; border: 1px solid #ccc;">
                    <img src="images/User_Avatar.png" style="width:100%; height:100%;" alt="User">
                </div>
                <div>
                    <a href="YourProfile.html?user=${name}" style="font-weight: bold; color: #0022cc; text-decoration: none; font-size: 16px;">${name}</a>
                    <p style="font-size: 11px; color: #090; margin-top: 5px;">Online</p>
                </div>
            </div>
        `;
    }
    
    // This part makes it so pressing "Enter" also triggers the search
    document.getElementById("userSearchInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            searchDatabase();
        }
    });
</script>
<script>
    async function searchDatabase() {
    const input = document.getElementById('userSearchInput').value.toLowerCase().trim();
    
    try {
        // 1. Ask the server for this specific user from MongoDB
        const response = await fetch(`/api/user/${input}`);
        const data = await response.json();

        // 2. If the server found them, redirect to their profile
        if (data.success && data.user) {
            window.location.href = `YourProfile.html?user=${data.user.username}`;
        } else {
            alert("User not found in the database!");
        }
    } catch (error) {
        console.error("Database connection failed:", error);
        alert("Could not connect to the database server.");
    }
}
</script>
