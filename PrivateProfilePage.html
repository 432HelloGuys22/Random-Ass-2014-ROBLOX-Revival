     <script>
        async function loadProfileData() {
    const params = new URLSearchParams(window.location.search);
    const targetUser = params.get('user');

    if (!targetUser) return;

    try {
        const response = await fetch('api/users.json');
        const users = await response.json();
        const user = users.find(u => u.username.toLowerCase() === targetUser.toLowerCase());

       if (user) {
            document.getElementById("profileUsername").innerText = user.username + "'s Profile";
            document.getElementById("userStatus").innerText = "[ " + user.status + " ]";
            document.getElementById("userAvatar").src = user.avatar;
            document.title = user.username + "'s Profile";

            document.querySelectorAll('.robux').forEach(el => el.innerText = "0");
            document.querySelectorAll('.tickets').forEach(el => el.innerText = "10");
        } else {
            document.getElementById("profileUsername").innerText = "User Not Found";
        }
        // MAKE SURE NOTHING IS HERE BETWEEN THE BRACE AND THE CATCH
    } catch (e) {
        console.error("Database error:", e);
    }
}
window.onload = loadProfileData;
     </script>
